apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiwix
  namespace: kiwix
  labels:
    app: kiwix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kiwix
  template:
    metadata:
      labels:
        app: kiwix
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: zim-download
        image: busybox:latest
        env:
        - name: ZIM_LINK
          value: "https://download.kiwix.org/zim/wikipedia/wikipedia_en_all_maxi_2026-02.zim"
        command:
          - sh
          - -c
          - |
            cd /data
            IFS=','
            for link in $ZIM_LINK; do
              link=$(echo "$link" | xargs)
              filename=$(basename "$link")
              if [ ! -f "/data/$filename" ]; then
                echo "Downloading $filename..."
                wget -O "/data/$filename" "$link"
                echo "Download complete: $filename"
              else
                echo "File already exists, skipping: $filename"
              fi
            done
            echo "All downloads complete!"
        volumeMounts:
        - name: kiwix-data
          mountPath: /data
      containers:
      - name: kiwix
        image: ghcr.io/kiwix/kiwix-serve:latest
        args:
          - "/data/*.zim"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: kiwix-data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: kiwix-data
        persistentVolumeClaim:
          claimName: kiwix-data
